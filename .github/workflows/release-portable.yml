name: Release Portable Bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v1.0.1"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: 一键启动版 ${{ steps.version.outputs.value }} | MT管理器 / 哔哩哔哩 / 52破解 / 米游社 Web 自动签到管理平台
          body: |
            自动构建并验收通过的便携版发布。

            当前资产包含：
            - Windows x64 解压即用版
            - Linux x64 解压即用版
            - 校验文件 sha256
          draft: false
          prerelease: false

  build-portable:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
          - runner: windows-latest
            platform: windows-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build portable bundle
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          python tools/build_portable_bundle.py --platform "${{ matrix.platform }}" --version "$VERSION"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          files: |
            dist/*${{ matrix.platform }}*
